<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="game-info">
            <h1>俄罗斯方块</h1>
            <div class="stats">
                <div class="stat">
                    <label>分数:</label>
                    <span id="score">0</span>
                </div>
                <div class="stat">
                    <label>等级:</label>
                    <span id="level">1</span>
                </div>
                <div class="stat">
                    <label>消除行数:</label>
                    <span id="lines">0</span>
                </div>
            </div>
            <div class="next-piece">
                <label>下一个:</label>
                <canvas id="nextCanvas"></canvas>
            </div>
            <div class="controls">
                <h3>操作说明</h3>
                <p>← → 左右移动</p>
                <p>↓ 加速下落</p>
                <p>↑ 旋转方块</p>
                <p>空格 暂停/继续</p>
            </div>
            <div class="ai-comments">
                <label>AI评价:</label>
                <div id="aiComment">等待开始...</div>
            </div>
            <button id="startBtn">开始游戏</button>
            <button id="muteBtn">🔊 音效开</button>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>
    <script src="audio.js"></script>
    <script src="script.js"></script>
</body>
</html>
